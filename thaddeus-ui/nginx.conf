server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://host.containers.internal:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /q/ {
        proxy_pass http://host.containers.internal:8081/q/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
