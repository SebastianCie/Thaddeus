# ── Thaddeus Agent ───────────────────────────────────────────────────────────
quarkus.application.name=thaddeus-agent
quarkus.http.port=8090

# ── Server connection ─────────────────────────────────────────────────────────
thaddeus.server.url=${THADDEUS_SERVER_URL:http://localhost:8080}

# ── OIDC Client Credentials ──────────────────────────────────────────────────
quarkus.oidc-client.auth-server-url=${OIDC_ISSUER_URL:http://localhost:8180/realms/thaddeus}
quarkus.oidc-client.client-id=${OIDC_CLIENT_ID:thaddeus-agent}
quarkus.oidc-client.credentials.secret=${OIDC_CLIENT_SECRET:change-me}
quarkus.oidc-client.grant.type=client

# ── Health ────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ── Dev profile (no OIDC needed) ──────────────────────────────────────────────
%dev.quarkus.oidc-client.enabled=false
%test.quarkus.oidc-client.enabled=false

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."de.thaddeus".level=DEBUG
