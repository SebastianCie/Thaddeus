# ── Application ──────────────────────────────────────────────────────────────
quarkus.application.name=thaddeus-server
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:3000

# ── Database ──────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:thaddeus}
quarkus.datasource.password=${DB_PASSWORD:thaddeus}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/thaddeus}

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.database.generation=none

# ── OIDC ──────────────────────────────────────────────────────────────────────
quarkus.oidc.auth-server-url=${OIDC_ISSUER_URL:http://localhost:8180/realms/thaddeus}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:thaddeus-server}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:change-me}
quarkus.oidc.application-type=service
quarkus.oidc.token.audience=${OIDC_CLIENT_ID:thaddeus-server}

# ── Security ─────────────────────────────────────────────────────────────────
# Role claim: realm_access.roles
quarkus.oidc.roles.role-claim-path=realm_access/roles

# ── Packages storage ─────────────────────────────────────────────────────────
thaddeus.packages.root=${PACKAGES_ROOT:/var/thaddeus/packages}
thaddeus.packages.max-size-mb=${PACKAGES_MAX_SIZE_MB:500}

# ── Encryption ───────────────────────────────────────────────────────────────
# 32-byte Base64-encoded AES key for secret variable encryption
thaddeus.encryption.key=${THADDEUS_ENCRYPTION_KEY:dGhhZGRldXMtZGVmYXVsdC1rZXktY2hhbmdlLW1l}

# ── Health ────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ── Dev profile ───────────────────────────────────────────────────────────────
%dev.quarkus.http.port=8081
%dev.quarkus.oidc.auth-server-url=http://localhost:8080/realms/thaddeus
%dev.quarkus.oidc.token.issuer=any
%dev.quarkus.http.cors.origins=*
%dev.quarkus.hibernate-orm.log.sql=false
%dev.thaddeus.packages.root=${user.home}/.thaddeus-dev/packages
%dev.quarkus.flyway.validate-on-migrate=false

# ── Test profile ──────────────────────────────────────────────────────────────
%test.quarkus.oidc.enabled=false
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:thaddeus-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.thaddeus.packages.root=/tmp/thaddeus-test-packages

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."de.thaddeus".level=DEBUG
