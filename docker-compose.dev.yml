# Development stack: only external dependencies (PostgreSQL + Keycloak)
# Run: podman-compose -f docker-compose.dev.yml up -d
# Then start thaddeus-server with: cd thaddeus-server && ../mvnw quarkus:dev
# And UI with: cd thaddeus-ui && npm run dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thaddeus
      POSTGRES_USER: thaddeus
      POSTGRES_PASSWORD: thaddeus
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thaddeus"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import
    ports:
      - "8180:8080"

volumes:
  postgres_data_dev:
