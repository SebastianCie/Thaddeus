name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_SERVER: ${{ github.repository_owner }}/thaddeus-server
  IMAGE_NAME_UI: ${{ github.repository_owner }}/thaddeus-ui

jobs:
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build server
        run: ./mvnw -pl thaddeus-server -am package -DskipTests

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./thaddeus-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SERVER }}:${{ github.sha }}

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: thaddeus-ui/package-lock.json

      - name: Install & build UI
        working-directory: thaddeus-ui
        run: |
          npm ci
          npm run build

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push UI image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./thaddeus-ui
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:${{ github.sha }}

  build-agent-windows:
    name: Build Windows Agent (Native)
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          native-image-job-reports: true

      - name: Build Windows native agent
        run: ./mvnw -pl thaddeus-agent -am package -Pnative -DskipTests
        shell: cmd

      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: thaddeus-agent-windows
          path: thaddeus-agent/target/thaddeus-agent-*.exe

      - name: Create GitHub Release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: thaddeus-agent/target/thaddeus-agent-*.exe
